---
# =============================================================================
# Playbook: hearth-config.yml
# Idempotent configuration enforcement — runs on every deployment.
# Ensures server configuration drift is corrected without re-installing software.
#
# Prerequisites:
#   hearth-init.yml must have been run once before this playbook.
#
# SSH CONNECTIVITY NOTE:
#   The deploy.yml workflow handles firewall access automatically when
#   run_config=true. See hearth-init.yml for manual access instructions.
#
# Install collections first (once):
#   ansible-galaxy collection install -r requirements.yml -p ./collections
#
# Run manually:
#   ansible-playbook hearth-config.yml \
#     -i <hearth_public_ip>, \
#     --private-key ~/.ssh/haven_ed25519
# =============================================================================

- name: Hearth — configuration enforcement
  hosts: all
  remote_user: root
  gather_facts: true

  vars_files:
    - vars/main.yml

  tasks:
    # =========================================================================
    # Ensure no competing web servers hold ports 80/443
    # =========================================================================

    - name: Stop and disable apache2 if present
      ansible.builtin.systemd:
        name: apache2
        state: stopped
        enabled: false
      failed_when: false

    - name: Stop and disable nginx if present
      ansible.builtin.systemd:
        name: nginx
        state: stopped
        enabled: false
      failed_when: false

    # =========================================================================
    # System — security updates
    # =========================================================================

    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Apply security-only upgrades
      ansible.builtin.apt:
        upgrade: safe
      register: apt_upgrade

    - name: Remove unused packages
      ansible.builtin.apt:
        autoremove: true

    # =========================================================================
    # Ensure required packages are present
    # =========================================================================

    - name: Ensure system packages are present
      ansible.builtin.apt:
        name:
          - curl
          - wget
          - gnupg
          - ca-certificates
          - borgbackup
          - htop
          - ncdu
          - fail2ban
          - jq
          - unattended-upgrades
          - apt-listchanges
        state: present

    # =========================================================================
    # Timezone
    # =========================================================================

    - name: Ensure timezone is {{ haven_timezone }}
      community.general.timezone:
        name: "{{ haven_timezone }}"

    # =========================================================================
    # Unattended security upgrades
    # =========================================================================

    - name: Ensure unattended-upgrades configuration (security only, no auto-reboot)
      ansible.builtin.copy:
        dest: /etc/apt/apt.conf.d/50unattended-upgrades
        mode: "0644"
        content: |
          Unattended-Upgrade::Allowed-Origins {
              "${distro_id}:${distro_codename}-security";
          };
          Unattended-Upgrade::AutoFixInterruptedDpkg "true";
          Unattended-Upgrade::MinimalSteps "true";
          Unattended-Upgrade::Remove-Unused-Dependencies "true";
          Unattended-Upgrade::Automatic-Reboot "false";

    - name: Ensure unattended-upgrades timer is enabled
      ansible.builtin.copy:
        dest: /etc/apt/apt.conf.d/20auto-upgrades
        mode: "0644"
        content: |
          APT::Periodic::Update-Package-Lists "1";
          APT::Periodic::Unattended-Upgrade "1";

    # =========================================================================
    # Docker
    # =========================================================================

    - name: Ensure Docker service is running and enabled
      ansible.builtin.systemd:
        name: docker
        enabled: true
        state: started

    # =========================================================================
    # haven service user
    # =========================================================================

    - name: Ensure haven group exists
      ansible.builtin.group:
        name: "{{ haven_group }}"
        system: true

    - name: Ensure haven user exists with correct settings
      ansible.builtin.user:
        name: "{{ haven_user }}"
        group: "{{ haven_group }}"
        groups: docker
        home: "{{ haven_install_path }}"
        create_home: false
        system: true
        shell: /bin/bash

    # =========================================================================
    # Directory structure
    # =========================================================================

    - name: Ensure haven directory tree exists with correct ownership
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: "{{ haven_user }}"
        group: "{{ haven_group }}"
        mode: "0750"
      loop:
        - "{{ haven_install_path }}"
        - "{{ haven_install_path }}/etc"
        - "{{ haven_install_path }}/var/data"
        - "{{ haven_install_path }}/var/logs"
        - "{{ haven_install_path }}/.ssh"

    # Caddy cert storage must be world-writable — Caddy runs as non-root
    # and needs to write ACME certificates to this directory.
    - name: Ensure Caddy cert storage dir is world-writable
      ansible.builtin.file:
        path: "{{ haven_install_path }}/var/certs"
        state: directory
        owner: root
        group: root
        mode: "0777"

    - name: Ensure .ssh has strict permissions
      ansible.builtin.file:
        path: "{{ haven_install_path }}/.ssh"
        state: directory
        owner: "{{ haven_user }}"
        group: "{{ haven_group }}"
        mode: "0700"

    # =========================================================================
    # fail2ban
    # =========================================================================

    - name: Ensure fail2ban is running and enabled
      ansible.builtin.systemd:
        name: fail2ban
        enabled: true
        state: started

    # =========================================================================
    # SSH hardening
    # =========================================================================

    - name: Ensure SSH — password authentication disabled
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "^#?PasswordAuthentication"
        line: "PasswordAuthentication no"
      notify: Restart sshd

    - name: Ensure SSH — empty passwords disabled
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "^#?PermitEmptyPasswords"
        line: "PermitEmptyPasswords no"
      notify: Restart sshd

    - name: Ensure SSH — root key-only (no password login)
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "^#?PermitRootLogin"
        line: "PermitRootLogin prohibit-password"
      notify: Restart sshd

    # =========================================================================
    # BorgBackup — backup script + cron (only when configure_borg=true)
    # =========================================================================
    # Requires that hearth-init.yml has already been run with configure_borg=true
    # to generate the SSH key and initialise the repo on the Storage Box.

    - name: Ensure scripts directory exists
      ansible.builtin.file:
        path: "{{ haven_install_path }}/scripts"
        state: directory
        owner: "{{ haven_user }}"
        group: "{{ haven_group }}"
        mode: "0750"
      when: configure_borg | bool

    - name: Deploy backup script from template
      ansible.builtin.template:
        src: templates/backup.sh.j2
        dest: "{{ haven_install_path }}/scripts/backup.sh"
        owner: "{{ haven_user }}"
        group: "{{ haven_group }}"
        mode: "0750"
      when: configure_borg | bool

    - name: Write BorgBackup passphrase to protected file
      ansible.builtin.copy:
        content: "{{ borg_passphrase }}"
        dest: "{{ haven_install_path }}/.borg_passphrase"
        owner: "{{ haven_user }}"
        group: "{{ haven_group }}"
        mode: "0400"
      when: configure_borg | bool
      no_log: true # contains borg_passphrase

    - name: Install BorgBackup cron job (daily at 02:00 UTC)
      ansible.builtin.cron:
        name: "haven-borg-backup"
        user: "{{ haven_user }}"
        minute: "0"
        hour: "2"
        job: >-
          {{ haven_install_path }}/scripts/backup.sh
          >> /var/log/haven-backup.log 2>&1
        state: present
      when: configure_borg | bool

    - name: Ensure backup log file exists and is owned by haven user
      ansible.builtin.file:
        path: /var/log/haven-backup.log
        state: touch
        owner: "{{ haven_user }}"
        group: "{{ haven_group }}"
        mode: "0640"
        modification_time: preserve
        access_time: preserve
      when: configure_borg | bool

    - name: Export BorgBackup repokey
      ansible.builtin.command:
        cmd: borg key export "{{ storagebox_subaccount }}@{{ storagebox_host }}:./hearth" -
      environment:
        BORG_PASSPHRASE: "{{ borg_passphrase }}"
        BORG_RSH: "ssh -i {{ haven_install_path }}/.ssh/borg_ed25519 -p 23 -o StrictHostKeyChecking=yes"
      become: true
      become_user: "{{ haven_user }}"
      vars:
        ansible_ssh_pipelining: false
      register: borg_key_export
      changed_when: false
      when: configure_borg | bool

    - name: Show BorgBackup repokey
      ansible.builtin.debug:
        msg: |
          ============================================================
          BORG REPOKEY — store this in Vaultwarden under "BorgBackup Hearth":

          {{ borg_key_export.stdout }}

          Without this key + the passphrase, backups cannot be restored.
          ============================================================
      when: configure_borg | bool

    # =========================================================================
    # Authentik — SSO Blueprint
    # =========================================================================
    # Deploys the rendered blueprint to the Authentik blueprints directory.
    # Authentik worker picks it up on startup and creates/updates providers
    # and applications idempotently (state: present).

    - name: Ensure Authentik blueprints directory exists
      ansible.builtin.file:
        path: "{{ haven_install_path }}/etc/authentik/blueprints"
        state: directory
        owner: "{{ haven_user }}"
        group: "{{ haven_group }}"
        mode: "0750"

    - name: Deploy Authentik SSO blueprint
      ansible.builtin.template:
        src: templates/authentik-blueprint.yaml.j2
        dest: "{{ haven_install_path }}/etc/authentik/blueprints/haven-apps.yaml"
        owner: "{{ haven_user }}"
        group: "{{ haven_group }}"
        mode: "0640"
      no_log: true # contains client secrets
      notify: Restart authentik-worker

    # =========================================================================
    # Validation — post-config diagnostics
    # =========================================================================
    # Verify critical files, directories, mounts, and services are in the
    # expected state. Read this output to spot issues without SSH access.

    # ----- Directory structure -----

    - name: "Validate: Check expected directories on host"
      ansible.builtin.stat:
        path: "{{ item }}"
      register: dir_checks
      loop:
        - "{{ haven_install_path }}/etc"
        - "{{ haven_install_path }}/etc/caddy"
        - "{{ haven_install_path }}/etc/caddy/config"
        - "{{ haven_install_path }}/etc/authentik/blueprints"
        - "{{ haven_install_path }}/etc/authentik/templates"
        - "{{ haven_install_path }}/var/data"
        - "{{ haven_install_path }}/var/data/authentik/media"
        - "{{ haven_install_path }}/var/data/authentik/postgresql"
        - "{{ haven_install_path }}/var/data/vaultwarden"
        - "{{ haven_install_path }}/var/data/portainer"
        - "{{ haven_install_path }}/var/data/infisical/postgresql"
        - "{{ haven_install_path }}/var/certs"
        - "{{ haven_install_path }}/var/logs"

    - name: "Validate: Show directory status"
      ansible.builtin.debug:
        msg: "{{ item.item }} — exists={{ item.stat.exists | default(false) }}, mode={{ item.stat.mode | default('?') }}, owner={{ item.stat.pw_name | default('?') }}:{{ item.stat.gr_name | default('?') }}"
      loop: "{{ dir_checks.results }}"
      loop_control:
        label: "{{ item.item }}"

    # ----- Critical config files on host -----

    - name: "Validate: Check expected files on host"
      ansible.builtin.stat:
        path: "{{ item }}"
      register: file_checks
      loop:
        - "{{ haven_install_path }}/etc/docker-compose.yml"
        - "{{ haven_install_path }}/etc/.env"
        - "{{ haven_install_path }}/etc/caddy/Caddyfile"
        - "{{ haven_install_path }}/etc/authentik/blueprints/haven-apps.yaml"

    - name: "Validate: Show file status"
      ansible.builtin.debug:
        msg: "{{ item.item }} — exists={{ item.stat.exists | default(false) }}, size={{ item.stat.size | default(0) }}B, mode={{ item.stat.mode | default('?') }}, owner={{ item.stat.pw_name | default('?') }}:{{ item.stat.gr_name | default('?') }}"
      loop: "{{ file_checks.results }}"
      loop_control:
        label: "{{ item.item }}"

    # ----- Caddy -----

    - name: "Validate: Caddyfile inside caddy container"
      ansible.builtin.shell:
        cmd: docker exec haven-caddy-1 cat /etc/caddy/Caddyfile 2>&1 | head -30
      register: caddy_caddyfile
      changed_when: false
      failed_when: false

    - name: "Validate: Show Caddyfile (first 30 lines)"
      ansible.builtin.debug:
        var: caddy_caddyfile.stdout_lines

    - name: "Validate: Caddy TLS certificates"
      ansible.builtin.shell:
        cmd: ls -la {{ haven_install_path }}/var/certs/ 2>&1 | head -20
      register: caddy_certs
      changed_when: false
      failed_when: false

    - name: "Validate: Show Caddy cert storage"
      ansible.builtin.debug:
        var: caddy_certs.stdout_lines

    # ----- Authentik -----

    - name: "Validate: Blueprint inside authentik-worker container"
      ansible.builtin.shell:
        cmd: docker exec haven-authentik-worker-1 ls -la /blueprints/custom/ 2>&1
      register: blueprint_container_ls
      changed_when: false
      failed_when: false

    - name: "Validate: Show blueprint container listing"
      ansible.builtin.debug:
        var: blueprint_container_ls.stdout_lines

    - name: "Validate: Authentik-worker volume mounts"
      ansible.builtin.shell:
        cmd: >
          docker inspect haven-authentik-worker-1
          --format '{{ '{{' }} json .Mounts {{ '}}' }}' 2>&1 | python3 -m json.tool
      register: worker_mounts
      changed_when: false
      failed_when: false

    - name: "Validate: Show authentik-worker mounts"
      ansible.builtin.debug:
        var: worker_mounts.stdout_lines

    - name: "Validate: Blueprint-related entries in worker logs"
      ansible.builtin.shell:
        cmd: >
          docker logs haven-authentik-worker-1 --tail 200 2>&1
          | grep -i "blueprint" || echo "NO BLUEPRINT LOG ENTRIES FOUND"
      register: blueprint_worker_logs
      changed_when: false
      failed_when: false

    - name: "Validate: Show blueprint worker log entries"
      ansible.builtin.debug:
        var: blueprint_worker_logs.stdout_lines

    - name: "Validate: Authentik DB connectivity"
      ansible.builtin.shell:
        cmd: docker exec haven-authentik-db-1 pg_isready -d authentik -U authentik 2>&1
      register: authentik_db_ready
      changed_when: false
      failed_when: false

    - name: "Validate: Show authentik DB status"
      ansible.builtin.debug:
        var: authentik_db_ready.stdout_lines

    # ----- Vaultwarden -----

    - name: "Validate: Vaultwarden data directory"
      ansible.builtin.shell:
        cmd: ls -la {{ haven_install_path }}/var/data/vaultwarden/ 2>&1 | head -20
      register: vaultwarden_data
      changed_when: false
      failed_when: false

    - name: "Validate: Show Vaultwarden data listing"
      ansible.builtin.debug:
        var: vaultwarden_data.stdout_lines

    - name: "Validate: Vaultwarden config.json absent (env vars authoritative)"
      ansible.builtin.stat:
        path: "{{ haven_install_path }}/var/data/vaultwarden/config.json"
      register: vw_config_json

    - name: "Validate: Show Vaultwarden config.json status"
      ansible.builtin.debug:
        msg: "config.json exists={{ vw_config_json.stat.exists | default(false) }} — should be false before deploy (env vars are authoritative)"

    # ----- Portainer -----

    - name: "Validate: Portainer data directory"
      ansible.builtin.shell:
        cmd: ls -la {{ haven_install_path }}/var/data/portainer/ 2>&1 | head -10
      register: portainer_data
      changed_when: false
      failed_when: false

    - name: "Validate: Show Portainer data listing"
      ansible.builtin.debug:
        var: portainer_data.stdout_lines

    # ----- Infisical -----

    - name: "Validate: Infisical DB connectivity"
      ansible.builtin.shell:
        cmd: docker exec haven-infisical-db-1 pg_isready -d infisical -U infisical 2>&1
      register: infisical_db_ready
      changed_when: false
      failed_when: false

    - name: "Validate: Show Infisical DB status"
      ansible.builtin.debug:
        var: infisical_db_ready.stdout_lines

    # ----- BorgBackup -----

    - name: "Validate: BorgBackup configuration"
      ansible.builtin.stat:
        path: "{{ item }}"
      register: borg_checks
      loop:
        - "{{ haven_install_path }}/scripts/backup.sh"
        - "{{ haven_install_path }}/.borg_passphrase"
        - "{{ haven_install_path }}/.ssh/borg_ed25519"
      when: configure_borg | bool

    - name: "Validate: Show BorgBackup file status"
      ansible.builtin.debug:
        msg: "{{ item.item }} — exists={{ item.stat.exists | default(false) }}, mode={{ item.stat.mode | default('?') }}"
      loop: "{{ borg_checks.results }}"
      loop_control:
        label: "{{ item.item }}"
      when: configure_borg | bool

    - name: "Validate: BorgBackup cron job"
      ansible.builtin.shell:
        cmd: crontab -u {{ haven_user }} -l 2>&1 | grep -i borg || echo "NO BORG CRON FOUND"
      register: borg_cron
      changed_when: false
      failed_when: false
      when: configure_borg | bool

    - name: "Validate: Show BorgBackup cron"
      ansible.builtin.debug:
        var: borg_cron.stdout_lines
      when: configure_borg | bool

    # ----- System services -----

    - name: "Validate: System services running"
      ansible.builtin.shell:
        cmd: |
          echo "=== System services ==="
          for svc in docker fail2ban ssh; do
            status=$(systemctl is-active "$svc" 2>/dev/null || echo "not-found")
            enabled=$(systemctl is-enabled "$svc" 2>/dev/null || echo "not-found")
            echo "  $svc: active=$status enabled=$enabled"
          done
          echo "=== Competing web servers (should be inactive) ==="
          for svc in apache2 nginx; do
            status=$(systemctl is-active "$svc" 2>/dev/null || echo "inactive")
            echo "  $svc: $status"
          done
        executable: /bin/bash
      register: system_services
      changed_when: false
      failed_when: false

    - name: "Validate: Show system services"
      ansible.builtin.debug:
        var: system_services.stdout_lines

    # ----- Container states (all services) -----

    - name: "Validate: All container states"
      ansible.builtin.shell:
        cmd: >
          docker compose
          --project-name haven
          -f {{ haven_install_path }}/etc/docker-compose.yml
          ps --format "table {{ '{{' }}.Name{{ '}}' }}\t{{ '{{' }}.Status{{ '}}' }}\t{{ '{{' }}.Ports{{ '}}' }}" 2>&1
      register: config_container_states
      changed_when: false
      failed_when: false

    - name: "Validate: Show container states"
      ansible.builtin.debug:
        var: config_container_states.stdout_lines

  # ===========================================================================
  # Handlers
  # ===========================================================================

  handlers:
    - name: Restart sshd
      ansible.builtin.systemd:
        name: ssh
        state: restarted

    - name: Restart authentik-worker
      ansible.builtin.command:
        cmd: >
          docker compose
          --project-name haven
          -f {{ haven_install_path }}/etc/docker-compose.yml
          restart authentik-worker
      ignore_errors: true
      changed_when: true
