[defaults]
inventory         = inventory.ini
remote_user       = root
# host_key_checking=false: CI connects to a fresh server whose IP came directly from
# the Hetzner API. There is no persistent known_hosts on the runner. Security is in
# the SSH key, not the host key. For manual runs, override with ANSIBLE_HOST_KEY_CHECKING=true.
host_key_checking = false
# yaml callback is bundled in ansible-core (ansible.builtin.yaml)
stdout_callback   = ansible.builtin.yaml
collections_path  = ./collections

[ssh_connection]
pipelining        = true
