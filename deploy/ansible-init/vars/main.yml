# =============================================================================
# Non-sensitive configuration variables for hearth-init.yml
# Sensitive values (borg_passphrase, storagebox_host, storagebox_subaccount)
# are passed via --extra-vars or environment variables at run time.
# =============================================================================

# haven service account (runs Docker containers)
haven_user: haven
haven_group: haven
haven_install_path: /opt/haven

# Server timezone
haven_timezone: Europe/Brussels

# Docker Compose working directory (where compose.yml will live)
haven_compose_path: "{{ haven_install_path }}/etc"

# BorgBackup — Storage Box sub-account name (set in Hetzner Robot)
# Full SSH target: {{ storagebox_subaccount }}@{{ storagebox_host }}:./hearth
storagebox_subaccount: hearth-backup

# Set true only after you have authorised the borg SSH key on the Storage Box.
# Step 1: run with configure_borg=false (default) — playbook will print the public key.
# Step 2: add the key to the Storage Box sub-account in Hetzner Robot.
# Step 3: re-run with -e configure_borg=true -e storagebox_host=<hostname>
configure_borg: false
