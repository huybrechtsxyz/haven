apiVersion: strata.huybrechts.xyz/v1
kind: configuration
meta:
  name: haven_config
  annotations:
    description: "Haven family platform configuration \u2014 Hetzner Hearth (Docker\
      \ Compose) + Forge (k3s)"
  labels:
    version: 1.0.0
  tags:
  - haven
  - hetzner
  - configuration
  - family
spec:
  logging:
    file: config/cfg-logging.yaml
  layering:
  - name: environment
    description: Deployment environment
    pattern: ''
    required: true
  deployment:
    additional_properties: false
    properties:
      environment:
        pattern: ^(prd|dev)$
        required: true
        description: Deployment environment (prd, dev)
  integrations:
  - name: git
    type: git
    capabilities:
    - repository
    description: Git version control
    required: true
    validation:
      command: git --version
      min_version: 2.30.0
    authentication:
      method: cli
  - name: haven_iac
    type: terraform
    capabilities:
    - infrastructure
    description: OpenTofu / Terraform infrastructure provisioner
    required: true
    validation:
      command: tofu version
      min_version: 1.6.0
    authentication:
      method: cli
  providers:
  - name: hetzner
    description: "Hetzner Cloud \u2014 EU-DE (Nuremberg)"
    additional_regions: false
    regions:
    - name: eu-de
      description: "Europe \u2014 Nuremberg (nbg1), Falkenstein (fsn1)"
    additional_resources: false
    resources:
    - name: virtualmachine
      category: compute
      subcategory: virtualmachine
      description: Hetzner Cloud Server
      additional_configurations: false
      configuration:
        server_type:
          pattern: ^(cx[0-9]+|cpx[0-9]+|cax[0-9]+|ccx[0-9]+)$
          required: true
          description: Hetzner server type (e.g. cx22, cpx41, cax21)
        image:
          pattern: ^[a-z0-9][a-z0-9\-\.]{1,32}$
          required: true
          description: OS image slug (e.g. ubuntu-24.04, debian-12)
        location:
          pattern: ^(nbg1|fsn1|hel1|ash|hil)$
          required: true
          description: Datacenter location (nbg1=Nuremberg, fsn1=Falkenstein, hel1=Helsinki)
    - name: objectstorage
      category: storage
      subcategory: objectstorage
      description: Hetzner Object Storage (S3-compatible)
      additional_configurations: false
      configuration:
        bucket_name:
          pattern: ^[a-z0-9][a-z0-9\-]{1,62}[a-z0-9]$
          required: true
          description: Globally unique bucket name (lowercase, hyphens allowed)
        location:
          pattern: ^(eu-central|us-east-1)$
          required: true
          description: Object Storage region (eu-central, us-east-1)
        acl:
          pattern: ^(private|public-read|public-read-write)$
          required: true
          description: Bucket ACL (private recommended)
        versioning:
          pattern: ^(true|false)$
          required: false
          description: Enable object versioning (boolean)
        public_access_block:
          pattern: ^(true|false)$
          required: false
          description: Block all public access (boolean)
  additional_topologies: false
  topologies:
  - type: single_node
    description: "Single-node Docker Compose host (Hearth \u2014 Caddy, Authentik,\
      \ Vaultwarden, Infisical)"
    additional_components: false
    components:
    - role: node
      description: Docker Compose host node
      uses_module: false
      is_control: true
      required: true
      min_count: 1
      max_count: 1
  - type: s3_buckets
    description: Hetzner Object Storage buckets managed via amazon.aws Ansible collection
    additional_components: false
    components:
    - role: storage
      description: S3-compatible object storage bucket
      uses_module: false
      is_control: false
      required: true
      min_count: 1
      max_count: null
