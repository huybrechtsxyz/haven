apiVersion: platform.huybrechts.xyz/v1
kind: platform_model
meta:
  name: haven_deploy_prd
  annotations:
    description: Production deployment for the Haven platform on Kamatera
  labels:
    version: 1.0.0
  tags:
  - haven
  - production
  - deployment
spec:
  deployment:
    environment: prd
  artifact_path: prd
  stages:
  - name: infrastructure
    type: infrastructure
    scope: all
    on_failure: stop
  properties:
    environment: prd
  workspace:
    name: haven_platform
    annotations:
      description: Haven platform workspace on Kamatera — Docker Swarm cluster
    labels:
      version: 1.0.0
    tags:
    - haven
    - platform
  providers:
  - name: kamatera_eu_fr
    description: Kamatera cloud provider — Europe Frankfurt datacenter
    annotations:
      description: Kamatera cloud provider — Europe Frankfurt datacenter
    labels:
      version: 1.0.0
    tags:
    - haven
    - kamatera
    - provider
    properties:
      type: kamatera
      region: eu-fr
  provisioners:
  - name: haven_iac
    provisioner: terraform
    source:
      repository: haven
      source_path: terraform
  topologies:
  - name: haven_swarm
    provider: kamatera_eu_fr
    provisioner: terraform
    type: docker_swarm
    components:
    - resource: haven_vm_manager
      role: manager
      count: 1
    - resource: haven_vm_infra
      role: worker
      count: 1
    - resource: haven_vm_worker
      role: worker
      count: 2
    volumes:
    - name: config
      type: replicated
    - name: docs
      type: replicated
    - name: data
      type: local
    - name: logs
      type: local
    - name: serve
      type: distributed
  resources:
  - name: haven_vm_manager
    annotations:
      description: Kamatera Virtual Machine for Haven Docker Swarm manager node
    labels:
      version: 1.0.0
    tags:
    - haven
    - vm
    - manager
    properties:
      provider_type: kamatera
      resource_type: virtualmachine
      unit_cost: 5.0
      category: compute
      subcategory: virtualmachine
    storage:
      install_path: /opt/install/haven
      disks:
      - size: 20
        label: haven-vm-manager-os
        mount: /mnt/data1
      volumes:
      - name: config
        path: /mnt/data1/etc/haven
      - name: docs
        path: /mnt/data1/var/docs/haven
      - name: data
        path: /mnt/data1/var/data/haven
      - name: logs
        path: /mnt/data1/var/logs/haven
      - name: serve
        path: /mnt/data1/var/serve
    configuration:
      os_name: Ubuntu
      os_code: 24.04 64bit
      cpu_type: A
      cpu_cores: 1
      ram_mb: 1024
      billing: hourly
    firewall: haven_vm_manager_merged_fw
    role: manager
    count: 1
  - name: haven_vm_infra
    annotations:
      description: Kamatera Infrastructure VM — databases and infrastructure services
        (Postgres, Redis, GlusterFS)
    labels:
      version: 1.0.0
    tags:
    - haven
    - vm
    - infra
    properties:
      provider_type: kamatera
      resource_type: virtualmachine
      unit_cost: 11.0
      category: compute
      subcategory: virtualmachine
    storage:
      install_path: /opt/install/haven
      disks:
      - size: 20
        label: haven-vm-infra-os
        mount: /mnt/data1
      - size: 40
        label: haven-vm-infra-data
        mount: /mnt/data2
      volumes:
      - name: config
        path: /mnt/data2/etc/haven
      - name: docs
        path: /mnt/data2/var/docs/haven
      - name: data
        path: /mnt/data2/var/data/haven
      - name: logs
        path: /mnt/data2/var/logs/haven
      - name: serve
        path: /mnt/data2/var/serve
    configuration:
      os_name: Ubuntu
      os_code: 24.04 64bit
      cpu_type: A
      cpu_cores: 1
      ram_mb: 4096
      billing: hourly
      disk_size: 40
    firewall: haven_vm_infra_merged_fw
    role: worker
    count: 1
  - name: haven_vm_worker
    annotations:
      description: Kamatera Virtual Machine for Haven Docker Swarm worker node — runs
        application containers
    labels:
      version: 1.0.0
    tags:
    - haven
    - vm
    - worker
    properties:
      provider_type: kamatera
      resource_type: virtualmachine
      unit_cost: 6.0
      category: compute
      subcategory: virtualmachine
    storage:
      install_path: /opt/install/haven
      disks:
      - size: 20
        label: haven-vm-worker-os
        mount: /mnt/data1
      volumes:
      - name: config
        path: /mnt/data1/etc/haven
      - name: docs
        path: /mnt/data1/var/docs/haven
      - name: data
        path: /mnt/data1/var/data/haven
      - name: logs
        path: /mnt/data1/var/logs/haven
      - name: serve
        path: /mnt/data1/var/serve
    configuration:
      os_name: Ubuntu
      os_code: 24.04 64bit
      cpu_type: A
      cpu_cores: 1
      ram_mb: 2048
      billing: hourly
    firewall: haven_vm_worker_merged_fw
    role: worker
    count: 2
  features: []
  variables:
  - key: WORKSPACE
    store: constant
    value: haven
  - key: DATACENTER
    store: constant
    value: kamatera-eu-fr
  secrets:
  - key: TERRAFORM_API_TOKEN
    store: bitwarden
    value: d47e736b-2db8-47d5-b46b-b2c8016ece73
  - key: KAMATERA_API_KEY
    store: bitwarden
    value: 357068b9-9f5f-4f79-940c-b2c8016cb88f
  - key: KAMATERA_API_SECRET
    store: bitwarden
    value: 6c9295a8-9fa4-4d38-8929-b2c8016d9b43
  - key: KAMATERA_PRIVATE_KEY
    store: bitwarden
    value: f16fffe2-77b7-4d20-bf6c-b2c9015c71d3
  - key: KAMATERA_PUBLIC_KEY
    store: bitwarden
    value: 6cc5b975-56a9-4d7a-80c7-b2c90151cce0
  - key: KAMATERA_ROOT_PASSWORD
    store: bitwarden
    value: 5083ae32-429d-428b-b7df-b2c901441bbb
  namespaces:
  - name: haven_ns_base
    annotations:
      description: Base infrastructure namespace for Haven — Traefik reverse proxy
    labels:
      version: 1.0.0
    tags:
    - haven
    - namespace
    modules:
    - module: traefik
  modules:
  - name: haven_traefik
    annotations:
      description: Traefik reverse proxy module for Haven — routing and TLS termination
    labels:
      version: 1.0.0
    tags:
    - haven
    - traefik
    source:
      repository: haven
      source_path: services/traefik
    properties:
      mounts:
      - name: configuration_files
        type: config
        change_mod: '0644'
        target_path: ${TRAEFIK_PATH_CONFIG}
        source_path: config
        description: Traefik static configuration
      - name: certificates
        type: config
        change_mod: '0600'
        target_path: ${TRAEFIK_PATH_CERTS}
        description: TLS certificates
      - name: documentation
        type: docs
        change_mod: '0644'
        target_path: ${TRAEFIK_PATH_DOCS}
        source_path: docs/traefik
        description: Module documentation
      - name: datafiles
        type: data
        change_mod: '0600'
        target_path: ${TRAEFIK_PATH_DATA}
        description: Certificate storage (ACME)
      - name: logging
        type: logs
        change_mod: '0644'
        target_path: ${TRAEFIK_PATH_LOGS}
        description: Access and error logs
      checks:
      - name: traefik_http_check
        label: Traefik HTTP Health Check
        target: consul
        type: http
        interval: 60s
        timeout: 5s
        retries: 3
      endpoints:
      - name: traefik_dashboard
        label: Traefik Dashboard
        url: http://localhost:8080/dashboard/
  firewalls:
  - name: haven_vm_manager_merged_fw
    annotations:
      description: Firewall rules for Haven Docker Swarm virtual machines
    labels:
      version: 1.0.0
    tags:
    - haven
    - firewall
    reset: true
    defaults:
    - direction: in
      permission: deny
      comment: Deny all incoming traffic by default
    - direction: out
      permission: deny
      comment: Deny all outgoing traffic by default
    allow:
    - direction: out
      proto: udp
      port: 53
      comment: DNS (UDP)
    - direction: out
      proto: tcp
      port: 53
      comment: DNS (TCP)
    - direction: out
      proto: udp
      port: 123
      comment: NTP
    - direction: in
      interface: lo
      comment: Loopback IN
    - direction: out
      interface: lo
      comment: Loopback OUT
    - direction: out
      proto: tcp
      port:
      - 20
      - 21
      comment: FTP
    - direction: out
      proto: tcp
      port: 11371
      comment: GPG keyserver
    - direction: in
      proto: tcp
      port: 22
      comment: SSH
    - direction: in
      proto: tcp
      port: 80
      comment: HTTP
    - direction: in
      proto: tcp
      port: 443
      comment: HTTPS
    - direction: out
      proto: tcp
      port: 80
      comment: HTTP
    - direction: out
      proto: tcp
      port: 443
      comment: HTTPS
    - direction: out
      proto: tcp
      port: 22
      to: 10.0.0.0/23
      comment: SSH Outbound to internal nodes
    - direction: in
      proto: tcp
      port: 2377
      from_: 10.0.0.0/23
      comment: Swarm Control IN
    - direction: out
      proto: tcp
      port: 2377
      to: 10.0.0.0/23
      comment: Swarm Control OUT
    - direction: in
      proto: udp
      port: 4789
      from_: 10.0.0.0/23
      comment: Swarm Overlay Network IN
    - direction: out
      proto: udp
      port: 4789
      to: 10.0.0.0/23
      comment: Swarm Overlay Network OUT
    - direction: in
      proto: tcp
      port: 7946
      from_: 10.0.0.0/23
      comment: Swarm Discovery TCP
    - direction: in
      proto: udp
      port: 7946
      from_: 10.0.0.0/23
      comment: Swarm Discovery UDP
    - direction: out
      proto: tcp
      port: 7946
      to: 10.0.0.0/23
      comment: Swarm Gossip TCP OUT
    - direction: out
