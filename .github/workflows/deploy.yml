# ==============================================================================
# Workflow Template: Deploy Workspace
# Generated by: strata new pipeline ${name}
#
# Description:
#   Deploys a platform workspace using strata CLI.
#   Runs build + deploy pipeline with secret injection.
#
# Secret Managers Supported:
#   - bitwarden  : Bitwarden Secrets Manager (bitwarden/sm-action)
#   - azure      : Azure Key Vault (azure/login + az keyvault)
#   - github     : GitHub Secrets (no action needed, use secrets.*)
#   - vault      : HashiCorp Vault (hashicorp/vault-action)
#
# Usage:
#   strata new pipeline <name> --set file=@repo/deploy/deploy-env.yaml
#                           --set secret_manager=bitwarden
#                           --set environment=production
# ==============================================================================

name: Deploy - haven

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Confirm branch to deploy (must match the branch this workflow runs on)"
        type: string
        required: true
      dry_run:
        description: "Dry run (plan only, no apply)"
        type: boolean
        default: false
      stage:
        description: "Limit to a specific stage (empty = all)"
        type: string
        required: false
      run_init:
        description: "Run one-time server initialisation (hearth-init Ansible playbook)"
        type: boolean
        default: false
      configure_borg:
        description: "Initialise BorgBackup repo on Storage Box (run only after SSH key is authorised in Hetzner Robot)"
        type: boolean
        default: false
      run_config:
        description: "Run idempotent configuration enforcement (hearth-config Ansible playbook)"
        type: boolean
        default: true
      run_deploy:
        description: "Deploy Docker Compose services to Hearth (hearth-deploy Ansible playbook)"
        type: boolean
        default: true
      full_restart:
        description: "Stop ALL containers before deploying (clean restart — use when containers have stale state)"
        type: boolean
        default: false
      backup_before_deploy:
        description: "Run a BorgBackup snapshot before deploying (requires configure_borg=true on server)"
        type: boolean
        default: false

permissions:
  contents: read

env:
  STRATA_OUTPUT: json
  STRATA_WORK_PATH: ${{ github.workspace }}
  DEPLOYMENT_FILE: "config/deploy-haven-prd.yaml"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy:
    name: Deploy haven
    runs-on: ubuntu-latest
    environment: production

    steps:
      # ------------------------------------------------------------------
      # Checkout
      # ------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v6

      # ------------------------------------------------------------------
      # Safety: block main branch deployments
      # ------------------------------------------------------------------
      - name: Block deployment from main branch
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "::error::Deployment from 'main' is blocked. Use a feature branch."
            exit 1
          fi
          if [ "${{ inputs.branch }}" = "main" ]; then
            echo "::error::Branch input cannot be 'main'. Use a feature branch."
            exit 1
          fi
          if [ "${{ inputs.branch }}" != "${{ github.ref_name }}" ]; then
            echo "::error::Branch input '${{ inputs.branch }}' does not match the running branch '${{ github.ref_name }}'. Re-run from the correct branch."
            exit 1
          fi

      # ------------------------------------------------------------------
      # Install tools
      # ------------------------------------------------------------------
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install strata
        run: pip install "xyz-strata==0.1.1"

      - name: Install Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false

      # ------------------------------------------------------------------
      # Validate
      # ------------------------------------------------------------------
      - name: Validate deployment file
        run: |
          strata validate -f $DEPLOYMENT_FILE --deep

      # ------------------------------------------------------------------
      # Build
      # ------------------------------------------------------------------
      - name: Build platform artifacts
        run: |
          strata build run --file $DEPLOYMENT_FILE

      - name: Upload build output
        uses: actions/upload-artifact@v7
        with:
          name: platform-build
          path: build/
          retention-days: 14

      # ------------------------------------------------------------------
      # Deploy
      # ------------------------------------------------------------------
      - name: Download build output
        uses: actions/download-artifact@v8
        with:
          name: platform-build
          path: build/

      - name: Deploy infrastructure
        env:
          # Terraform Cloud/CLI expects TF_TOKEN_app_terraform_io for API authentication
          # but we also set the plain TERRAFORM_API_TOKEN for strata value resolution in
          # Ansible playbooks (e.g. hearth-deploy.yml).
          TERRAFORM_API_TOKEN: ${{ secrets.TERRAFORM_API_TOKEN }}
          TF_TOKEN_app_terraform_io: ${{ secrets.TERRAFORM_API_TOKEN }}
          # TF_VAR_* still needed for Terraform to pick up directly
          TF_VAR_HETZNER_API_TOKEN: ${{ secrets.HETZNER_API_TOKEN }}
          TF_VAR_HETZNER_PUBLIC_KEY: ${{ secrets.HETZNER_PUBLIC_KEY }}
          TF_VAR_HETZNER_PRIVATE_KEY: ${{ secrets.HETZNER_PRIVATE_KEY }}
          TF_VAR_HEARTH_SSH_PRIVATE_KEY: ${{ secrets.HETZNER_PRIVATE_KEY }}
          TF_VAR_HETZNER_ROOT_PASSWORD: ${{ secrets.HETZNER_ROOT_PASSWORD }}
          # Plain names for strata value resolution
          HETZNER_API_TOKEN: ${{ secrets.HETZNER_API_TOKEN }}
          HETZNER_PUBLIC_KEY: ${{ secrets.HETZNER_PUBLIC_KEY }}
          HETZNER_PRIVATE_KEY: ${{ secrets.HETZNER_PRIVATE_KEY }}
          HETZNER_ROOT_PASSWORD: ${{ secrets.HETZNER_ROOT_PASSWORD }}
          HETZNER_STORAGEBOX_PASSWORD: ${{ secrets.HETZNER_STORAGEBOX_PASSWORD }}
          # Application secrets (needed so strata resolves the full environment)
          HEALTHCHECK_PING_URL_BACKUP: ${{ vars.HEALTHCHECK_PING_URL_BACKUP }}
          STORAGEBOX_HOST: ${{ vars.STORAGEBOX_HOST }}
          STORAGEBOX_SUBACCOUNT_HEARTH: ${{ vars.STORAGEBOX_SUBACCOUNT_HEARTH }}
          BORG_PASSPHRASE: ${{ secrets.BORG_PASSPHRASE }}
          AUTHENTIK_SECRET_KEY: ${{ secrets.AUTHENTIK_SECRET_KEY }}
          AUTHENTIK_POSTGRESQL_PASSWORD: ${{ secrets.AUTHENTIK_POSTGRESQL_PASSWORD }}
          VAULTWARDEN_ADMIN_TOKEN: ${{ secrets.VAULTWARDEN_ADMIN_TOKEN }}
          VAULTWARDEN_SSO_CLIENT_SECRET: ${{ secrets.VAULTWARDEN_SSO_CLIENT_SECRET }}
          INFISICAL_AUTH_SECRET: ${{ secrets.INFISICAL_AUTH_SECRET }}
          INFISICAL_ENCRYPTION_KEY: ${{ secrets.INFISICAL_ENCRYPTION_KEY }}
          INFISICAL_POSTGRESQL_PASSWORD: ${{ secrets.INFISICAL_POSTGRESQL_PASSWORD }}
          WUD_SSO_CLIENT_SECRET: ${{ secrets.WUD_SSO_CLIENT_SECRET }}
        run: |
          ARGS="--file $DEPLOYMENT_FILE --force"
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          if [ -n "${{ inputs.stage }}" ]; then
            ARGS="$ARGS --stage ${{ inputs.stage }}"
          fi
          strata deploy run $ARGS

      # ------------------------------------------------------------------
      # Init (one-time server initialisation — run_init=true only)
      # Temporarily opens SSH on the Hetzner firewall for the runner IP,
      # runs hearth-init.yml, then always removes the rule.
      # ------------------------------------------------------------------

      - name: Get runner public IP
        if: ${{ (inputs.run_init == true || inputs.run_config == true || inputs.run_deploy == true) && inputs.dry_run != true }}
        id: runner_ip
        run: echo "ip=$(curl -sf https://api.ipify.org)" >> $GITHUB_OUTPUT

      - name: Get Hearth server public IP
        if: ${{ (inputs.run_init == true || inputs.run_config == true || inputs.run_deploy == true) && inputs.dry_run != true }}
        id: hearth_ip
        env:
          HETZNER_API_TOKEN: ${{ secrets.HETZNER_API_TOKEN }}
        run: |
          ip=$(curl -sf \
            -H "Authorization: Bearer $HETZNER_API_TOKEN" \
            "https://api.hetzner.cloud/v1/servers?name=haven-platform-hearth" \
            | jq -r '.servers[0].public_net.ipv4.ip')
          echo "ip=$ip" >> $GITHUB_OUTPUT

      - name: Get Hetzner firewall ID
        if: ${{ (inputs.run_init == true || inputs.run_config == true || inputs.run_deploy == true) && inputs.dry_run != true }}
        id: fw
        env:
          HETZNER_API_TOKEN: ${{ secrets.HETZNER_API_TOKEN }}
        run: |
          RESPONSE=$(curl -sf \
            -H "Authorization: Bearer $HETZNER_API_TOKEN" \
            "https://api.hetzner.cloud/v1/firewalls?name=haven-platform-fw-hearth")
          echo "API response: $RESPONSE"
          id=$(echo "$RESPONSE" | jq -r '.firewalls[0].id // empty')
          if [ -z "$id" ]; then
            echo "ERROR: firewall 'haven-platform-fw-hearth' not found"
            echo "Available firewalls:"
            curl -sf -H "Authorization: Bearer $HETZNER_API_TOKEN" \
              "https://api.hetzner.cloud/v1/firewalls" | jq -r '.firewalls[].name'
            exit 1
          fi
          echo "Firewall ID: $id"
          echo "id=$id" >> $GITHUB_OUTPUT

      - name: Open temporary SSH rule for runner
        if: ${{ (inputs.run_init == true || inputs.run_config == true || inputs.run_deploy == true) && inputs.dry_run != true }}
        env:
          HETZNER_API_TOKEN: ${{ secrets.HETZNER_API_TOKEN }}
        run: |
          FW_ID="${{ steps.fw.outputs.id }}"
          RUNNER_IP="${{ steps.runner_ip.outputs.ip }}/32"
          RUN_ID="${{ github.run_id }}"
          # GET current rules
          CURRENT=$(curl -sf \
            -H "Authorization: Bearer $HETZNER_API_TOKEN" \
            "https://api.hetzner.cloud/v1/firewalls/$FW_ID")
          # Append our temporary SSH rule to the existing rules and set_rules
          PAYLOAD=$(echo "$CURRENT" | jq \
            --arg ip "$RUNNER_IP" \
            --arg run "$RUN_ID" \
            '{rules: (.firewall.rules + [{direction:"in",protocol:"tcp",port:"22",source_ips:[$ip],description:("CI init SSH run-"+$run)}])}')
          HTTP=$(curl -s -o /tmp/fw_set.json -w "%{http_code}" -X POST \
            -H "Authorization: Bearer $HETZNER_API_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.hetzner.cloud/v1/firewalls/$FW_ID/actions/set_rules" \
            -d "$PAYLOAD")
          cat /tmp/fw_set.json
          [ "$HTTP" -lt 400 ]

      - name: Install Ansible
        if: ${{ (inputs.run_init == true || inputs.run_config == true || inputs.run_deploy == true) && inputs.dry_run != true }}
        run: pip install ansible-core

      - name: Write deploy SSH private key
        if: ${{ (inputs.run_init == true || inputs.run_config == true || inputs.run_deploy == true) && inputs.dry_run != true }}
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HETZNER_PRIVATE_KEY }}" > ~/.ssh/haven_ed25519
          chmod 600 ~/.ssh/haven_ed25519

      - name: Install Ansible collections (init)
        if: ${{ inputs.run_init == true && inputs.dry_run != true }}
        working-directory: deploy/ansible-init
        run: ansible-galaxy collection install -r requirements.yml -p ./collections

      - name: Write Ansible vars file for borg init
        if: ${{ inputs.run_init == true && inputs.configure_borg == true && inputs.dry_run != true }}
        run: |
          cat > /tmp/init_vars.yml << VARSEOF
          configure_borg: true
          storagebox_host: "${{ vars.STORAGEBOX_HOST }}"
          storagebox_subaccount: "${{ vars.STORAGEBOX_SUBACCOUNT_HEARTH }}"
          borg_passphrase: "${{ secrets.BORG_PASSPHRASE }}"
          storagebox_password: "${{ secrets.HETZNER_STORAGEBOX_PASSWORD }}"
          VARSEOF

      - name: Run hearth-init playbook
        if: ${{ inputs.run_init == true && inputs.dry_run != true }}
        working-directory: deploy/ansible-init
        run: |
          if [ "${{ inputs.configure_borg }}" = "true" ]; then
            EXTRA_ARGS="-e @/tmp/init_vars.yml"
          else
            EXTRA_ARGS="-e configure_borg=false"
          fi
          ansible-playbook hearth-init.yml \
            -i "${{ steps.hearth_ip.outputs.ip }}," \
            --private-key ~/.ssh/haven_ed25519 \
            $EXTRA_ARGS

      - name: Clean up init vars file
        if: ${{ always() && inputs.run_init == true && inputs.configure_borg == true && inputs.dry_run != true }}
        run: rm -f /tmp/init_vars.yml

      - name: Install Ansible collections (config)
        if: ${{ inputs.run_config == true && inputs.dry_run != true }}
        working-directory: deploy/ansible-config
        run: ansible-galaxy collection install -r requirements.yml -p ./collections

      # ------------------------------------------------------------------
      # Full restart: stop all haven containers (clean slate before redeploy)
      # ------------------------------------------------------------------
      - name: Stop all haven containers
        if: ${{ inputs.full_restart == true && inputs.dry_run != true }}
        run: |
          ssh -i ~/.ssh/haven_ed25519 -o StrictHostKeyChecking=no \
            root@${{ steps.hearth_ip.outputs.ip }} \
            "docker compose --project-name haven -f /opt/haven/etc/docker-compose.yml down || true"

      - name: Write Ansible vars file for config secrets
        if: ${{ inputs.run_config == true && inputs.dry_run != true }}
        run: |
          cat > /tmp/config_vars.yml << VARSEOF
          borg_passphrase: "${{ secrets.BORG_PASSPHRASE }}"
          storagebox_host: "${{ vars.STORAGEBOX_HOST }}"
          storagebox_subaccount: "${{ vars.STORAGEBOX_SUBACCOUNT_HEARTH }}"
          healthcheck_ping_url: "${{ vars.HEALTHCHECK_PING_URL_BACKUP }}"
          vaultwarden_sso_client_secret: "${{ secrets.VAULTWARDEN_SSO_CLIENT_SECRET }}"
          wud_sso_client_secret: "${{ secrets.WUD_SSO_CLIENT_SECRET }}"
          VARSEOF

      - name: Run hearth-config playbook
        if: ${{ inputs.run_config == true && inputs.dry_run != true }}
        working-directory: deploy/ansible-config
        run: |
          ansible-playbook hearth-config.yml \
            -i "${{ steps.hearth_ip.outputs.ip }}," \
            --private-key ~/.ssh/haven_ed25519 \
            -e @/tmp/config_vars.yml

      - name: Clean up config vars file
        if: ${{ always() && inputs.run_config == true && inputs.dry_run != true }}
        run: rm -f /tmp/config_vars.yml

      # ------------------------------------------------------------------
      # Pre-deploy backup (backup_before_deploy=true + run_deploy=true)
      # Runs a BorgBackup snapshot before any container changes are made.
      # Only active when configure_borg=true is set in vars/main.yml.
      # ------------------------------------------------------------------

      - name: Run pre-deploy backup
        if: ${{ inputs.backup_before_deploy == true && inputs.run_deploy == true && inputs.dry_run != true }}
        run: |
          ansible all \
            -i "${{ steps.hearth_ip.outputs.ip }}," \
            -u root \
            --private-key ~/.ssh/haven_ed25519 \
            -m command \
            -a "sudo -u haven /opt/haven/scripts/backup.sh"

      - name: Write Ansible vars file for deploy secrets
        if: ${{ inputs.run_deploy == true && inputs.dry_run != true }}
        run: |
          cat > /tmp/deploy_vars.yml << 'VARSEOF'
          authentik_secret_key: "${{ secrets.AUTHENTIK_SECRET_KEY }}"
          authentik_postgresql_password: "${{ secrets.AUTHENTIK_POSTGRESQL_PASSWORD }}"
          vaultwarden_admin_token: "${{ secrets.VAULTWARDEN_ADMIN_TOKEN }}"
          infisical_auth_secret: "${{ secrets.INFISICAL_AUTH_SECRET }}"
          infisical_encryption_key: "${{ secrets.INFISICAL_ENCRYPTION_KEY }}"
          infisical_postgresql_password: "${{ secrets.INFISICAL_POSTGRESQL_PASSWORD }}"
          vaultwarden_sso_client_secret: "${{ secrets.VAULTWARDEN_SSO_CLIENT_SECRET }}"
          wud_sso_client_secret: "${{ secrets.WUD_SSO_CLIENT_SECRET }}"
          VARSEOF

      - name: Run hearth-deploy playbook
        if: ${{ inputs.run_deploy == true && inputs.dry_run != true }}
        working-directory: deploy/ansible-deploy
        run: |
          ansible-playbook hearth-deploy.yml \
            -i "${{ steps.hearth_ip.outputs.ip }}," \
            --private-key ~/.ssh/haven_ed25519 \
            -e @/tmp/deploy_vars.yml

      - name: Clean up vars file
        if: ${{ always() && inputs.run_deploy == true && inputs.dry_run != true }}
        run: rm -f /tmp/deploy_vars.yml

      - name: Remove temporary SSH rule for runner
        if: ${{ always() && (inputs.run_init == true || inputs.run_config == true || inputs.run_deploy == true) && inputs.dry_run != true }}
        env:
          HETZNER_API_TOKEN: ${{ secrets.HETZNER_API_TOKEN }}
        run: |
          FW_ID="${{ steps.fw.outputs.id }}"
          RUN_ID="${{ github.run_id }}"
          # GET current rules and remove the one we added
          CURRENT=$(curl -sf \
            -H "Authorization: Bearer $HETZNER_API_TOKEN" \
            "https://api.hetzner.cloud/v1/firewalls/$FW_ID")
          PAYLOAD=$(echo "$CURRENT" | jq \
            --arg run "$RUN_ID" \
            '{rules: [.firewall.rules[] | select(.description != ("CI init SSH run-"+$run))]}')
          curl -s -X POST \
            -H "Authorization: Bearer $HETZNER_API_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.hetzner.cloud/v1/firewalls/$FW_ID/actions/set_rules" \
            -d "$PAYLOAD" || true
