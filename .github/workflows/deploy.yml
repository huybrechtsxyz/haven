# ==============================================================================
# Workflow: Deploy Haven PRD
#
# Deploys the haven_deploy_prd workspace to the production environment using
# strata composite actions as individual building blocks.
#
# Actions are currently pinned to @deployment-bugs for integration testing.
# Switch all action refs from @deployment-bugs to @v0 for production use.
# ==============================================================================

name: Deploy Haven PRD

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (plan only, no apply)"
        type: boolean
        default: true
      stage:
        description: "Limit to a specific stage (empty = all)"
        type: string
        required: false

permissions:
  contents: read

concurrency:
  group: deploy-haven-prd
  cancel-in-progress: false

env:
  DEPLOYMENT_FILE: config/deploy-haven-prd.yaml

jobs:
  deploy:
    name: Deploy Haven PRD
    runs-on: ubuntu-latest
    environment: production
    env:
      HETZNER_API_TOKEN: ${{ secrets.HETZNER_API_TOKEN }}
      HETZNER_PRIVATE_KEY: ${{ secrets.HETZNER_PRIVATE_KEY }}
      HETZNER_PUBLIC_KEY: ${{ secrets.HETZNER_PUBLIC_KEY }}
      HETZNER_ROOT_PASSWORD: ${{ secrets.HETZNER_ROOT_PASSWORD }}
      INFISICAL_ESO_TOKEN: ${{ secrets.INFISICAL_ESO_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup yq
        uses: huybrechtsxyz/strata/.github/actions/setup-yq@deployment-bugs

      - name: Setup strata
        uses: huybrechtsxyz/strata/.github/actions/setup-strata@deployment-bugs
        with:
          python-version: "3.13"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Validate deployment
        uses: huybrechtsxyz/strata/.github/actions/validate-deployment@deployment-bugs
        with:
          deployment_file: ${{ env.DEPLOYMENT_FILE }}

      - name: Get deployment name
        id: get_name
        uses: huybrechtsxyz/strata/.github/actions/get-deployment-name@deployment-bugs
        with:
          deployment_file: ${{ env.DEPLOYMENT_FILE }}

      - name: Verify integrations
        uses: huybrechtsxyz/strata/.github/actions/verify-integrations@deployment-bugs

      - name: Build deployment
        uses: huybrechtsxyz/strata/.github/actions/build-deployment@deployment-bugs
        with:
          deployment_file: ${{ env.DEPLOYMENT_FILE }}

      # NOTE: --stage support is pending upstream in run-deployment action.
      # inputs.stage is captured here but not yet forwarded.
      - name: Run deployment
        uses: huybrechtsxyz/strata/.github/actions/run-deployment@deployment-bugs
        with:
          deployment_file: ${{ env.DEPLOYMENT_FILE }}
          deployment_name: ${{ steps.get_name.outputs.deployment_name }}
          dry_run: ${{ inputs.dry_run }}
