# ==============================================================================
# Workflow Template: Deploy Workspace
# Generated by: strata new pipeline ${name}
#
# Description:
#   Deploys a platform workspace using strata CLI.
#   Runs build + deploy pipeline with secret injection.
#
# Secret Managers Supported:
#   - bitwarden  : Bitwarden Secrets Manager (bitwarden/sm-action)
#   - azure      : Azure Key Vault (azure/login + az keyvault)
#   - github     : GitHub Secrets (no action needed, use secrets.*)
#   - vault      : HashiCorp Vault (hashicorp/vault-action)
#
# Usage:
#   strata new pipeline <name> --set file=@repo/deploy/deploy-env.yaml
#                           --set secret_manager=bitwarden
#                           --set environment=production
# ==============================================================================

name: Deploy - haven

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (plan only, no apply)"
        type: boolean
        default: false
      stage:
        description: "Limit to a specific stage (empty = all)"
        type: string
        required: false
      run_init:
        description: "Run one-time server initialisation (hearth-init Ansible playbook)"
        type: boolean
        default: false

permissions:
  contents: read

env:
  STRATA_OUTPUT: json
  STRATA_WORK_PATH: ${{ github.workspace }}
  DEPLOYMENT_FILE: "config/deploy-haven-prd.yaml"

jobs:
  deploy:
    name: Deploy haven
    runs-on: ubuntu-latest
    environment: production

    steps:
      # ------------------------------------------------------------------
      # Checkout
      # ------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ------------------------------------------------------------------
      # Install tools
      # ------------------------------------------------------------------
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install strata
        run: pip install "xyz-strata==0.0.9"

      - name: Install Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      # ------------------------------------------------------------------
      # Validate
      # ------------------------------------------------------------------
      - name: Validate deployment file
        run: |
          strata validate -f $DEPLOYMENT_FILE --deep

      # ------------------------------------------------------------------
      # Build
      # ------------------------------------------------------------------
      - name: Build platform artifacts
        run: |
          strata build run --file $DEPLOYMENT_FILE

      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: platform-build
          path: build/
          retention-days: 14

      # ------------------------------------------------------------------
      # Deploy
      # ------------------------------------------------------------------
      - name: Download build output
        uses: actions/download-artifact@v4
        with:
          name: platform-build
          path: build/

      - name: Deploy infrastructure
        env:
          TERRAFORM_API_TOKEN: ${{ secrets.TERRAFORM_API_TOKEN }}
          TF_TOKEN_app_terraform_io: ${{ secrets.TERRAFORM_API_TOKEN }}
          TF_VAR_HETZNER_API_TOKEN: ${{ secrets.HETZNER_API_TOKEN }}
          TF_VAR_HETZNER_PUBLIC_KEY: ${{ secrets.HETZNER_PUBLIC_KEY }}
          TF_VAR_HETZNER_PRIVATE_KEY: ${{ secrets.HETZNER_PRIVATE_KEY }}
          TF_VAR_HEARTH_SSH_PRIVATE_KEY: ${{ secrets.HEARTH_SSH_PRIVATE_KEY }}
          TF_VAR_HETZNER_ROOT_PASSWORD: ${{ secrets.HETZNER_ROOT_PASSWORD }}
        run: |
          ARGS="--file $DEPLOYMENT_FILE --force"
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          if [ -n "${{ inputs.stage }}" ]; then
            ARGS="$ARGS --stage ${{ inputs.stage }}"
          fi
          strata deploy run $ARGS

      # ------------------------------------------------------------------
      # Init (one-time server initialisation — run_init=true only)
      # Temporarily opens SSH on the Hetzner firewall for the runner IP,
      # runs hearth-init.yml, then always removes the rule.
      # ------------------------------------------------------------------

      - name: Get runner public IP
        if: ${{ inputs.run_init == true && inputs.dry_run != true }}
        id: runner_ip
        run: echo "ip=$(curl -sf https://api.ipify.org)" >> $GITHUB_OUTPUT

      - name: Get Hearth server public IP
        if: ${{ inputs.run_init == true && inputs.dry_run != true }}
        id: hearth_ip
        env:
          HETZNER_API_TOKEN: ${{ secrets.HETZNER_API_TOKEN }}
        run: |
          ip=$(curl -sf \
            -H "Authorization: Bearer $HETZNER_API_TOKEN" \
            "https://api.hetzner.cloud/v1/servers?name=haven-platform-hearth" \
            | jq -r '.servers[0].public_net.ipv4.ip')
          echo "ip=$ip" >> $GITHUB_OUTPUT

      - name: Get Hetzner firewall ID
        if: ${{ inputs.run_init == true && inputs.dry_run != true }}
        id: fw
        env:
          HETZNER_API_TOKEN: ${{ secrets.HETZNER_API_TOKEN }}
        run: |
          id=$(curl -sf \
            -H "Authorization: Bearer $HETZNER_API_TOKEN" \
            "https://api.hetzner.cloud/v1/firewalls?name=haven-platform-fw-hearth" \
            | jq -r '.firewalls[0].id')
          echo "id=$id" >> $GITHUB_OUTPUT

      - name: Open temporary SSH rule for runner
        if: ${{ inputs.run_init == true && inputs.dry_run != true }}
        env:
          HETZNER_API_TOKEN: ${{ secrets.HETZNER_API_TOKEN }}
        run: |
          PAYLOAD=$(jq -n \
            --arg ip "${{ steps.runner_ip.outputs.ip }}/32" \
            --arg run "${{ github.run_id }}" \
            '{rules: [{direction:"in",protocol:"tcp",port:"22",source_ips:[$ip],description:("CI init SSH run-"+$run)}]}')
          HTTP=$(curl -s -o /tmp/fw_add.json -w "%{http_code}" -X POST \
            -H "Authorization: Bearer $HETZNER_API_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.hetzner.cloud/v1/firewalls/${{ steps.fw.outputs.id }}/actions/add_rules" \
            -d "$PAYLOAD")
          cat /tmp/fw_add.json
          [ "$HTTP" -lt 400 ]

      - name: Install Ansible
        if: ${{ inputs.run_init == true && inputs.dry_run != true }}
        run: pip install ansible-core

      - name: Install Ansible collections
        if: ${{ inputs.run_init == true && inputs.dry_run != true }}
        working-directory: deploy/ansible-init
        run: ansible-galaxy collection install -r requirements.yml -p ./collections

      - name: Write deploy SSH private key
        if: ${{ inputs.run_init == true && inputs.dry_run != true }}
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HETZNER_PRIVATE_KEY }}" > ~/.ssh/haven_ed25519
          chmod 600 ~/.ssh/haven_ed25519

      - name: Run hearth-init playbook
        if: ${{ inputs.run_init == true && inputs.dry_run != true }}
        working-directory: deploy/ansible-init
        run: |
          ansible-playbook hearth-init.yml \
            -i "${{ steps.hearth_ip.outputs.ip }}," \
            --private-key ~/.ssh/haven_ed25519 \
            -e configure_borg=false

      - name: Remove temporary SSH rule for runner
        if: ${{ always() && inputs.run_init == true && inputs.dry_run != true }}
        env:
          HETZNER_API_TOKEN: ${{ secrets.HETZNER_API_TOKEN }}
        run: |
          PAYLOAD=$(jq -n \
            --arg ip "${{ steps.runner_ip.outputs.ip }}/32" \
            --arg run "${{ github.run_id }}" \
            '{rules: [{direction:"in",protocol:"tcp",port:"22",source_ips:[$ip],description:("CI init SSH run-"+$run)}]}')
          curl -s -X POST \
            -H "Authorization: Bearer $HETZNER_API_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.hetzner.cloud/v1/firewalls/${{ steps.fw.outputs.id }}/actions/delete_rules" \
            -d "$PAYLOAD" || true
