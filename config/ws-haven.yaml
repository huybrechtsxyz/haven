apiVersion: strata.huybrechts.xyz/v1
kind: workspace
meta:
  name: haven_platform
  annotations:
    description: Family platform workspace — Hearth VPS (Docker Compose) + Forge VPS (k3s) on Hetzner
  labels:
    version: "1.0.0"
  tags: [haven, hetzner, platform, family]
spec:
  providers:
    - name: hetzner_dc_eu_de
      file: "config/dc-hetzner-eu-de.yaml"

  provisioners:
    - name: haven_iac
      provisioner: terraform
      source:
        repository: haven
        source_path: deploy/terraform
        target_path: terraform
    - name: haven_s3
      provisioner: ansible
      source:
        repository: haven
        source_path: deploy/ansible-s3
        target_path: ansible_s3

  namespaces:
    - name: hearth
      file: config/hearth/ns-hearth.yaml

  topology:
    - name: hetzner_hearth
      provider: hetzner_dc_eu_de
      provisioner: haven_iac
      type: single_node # Docker Compose — Caddy, Authentik, Vaultwarden, Infisical
      namespaces:
        - namespace: hearth
      volumes:
        - name: config
          type: local
        - name: data
          type: local
        - name: logs
          type: local
        - name: certs
          type: local
      components:
        - resource: haven_vm_hetzner_hearth

    - name: hetzner_forge
      provider: hetzner_dc_eu_de
      provisioner: haven_iac
      type: single_node # k3s — Immich, Jellyfin, Gatus, home-grown apps
      volumes:
        - name: k3s
          type: local
        - name: data
          type: local
        - name: media
          type: local # /mnt/storagebox — NFS-mounted Storage Box (configured by Ansible)
      components:
        - resource: haven_vm_hetzner_forge

    - name: s3_storage
      provider: hetzner_dc_eu_de
      provisioner: haven_s3
      type: s3_buckets # Hetzner Object Storage via amazon.aws Ansible collection
      components:
        - resource: haven_s3_forge_photos
        - resource: haven_s3_forge_media
        - resource: haven_s3_forge_archive

  resources:
    - name: haven_vm_hetzner_hearth
      file: "config/hearth/vm-hetzner-hearth.yaml"
      role: hearth
      count: 1
      firewalls:
        - haven_fw_hetzner_hearth

    - name: haven_vm_hetzner_forge
      file: "config/forge/vm-hetzner-forge.yaml"
      role: forge
      count: 1
      firewalls:
        - haven_fw_hetzner_forge

    - name: haven_s3_forge_photos
      file: "config/forge/s3-haven-photos.yaml"
      role: storage
      count: 1

    - name: haven_s3_forge_media
      file: "config/forge/s3-haven-media.yaml"
      role: storage
      count: 1

    - name: haven_s3_forge_archive
      file: "config/forge/s3-haven-archive.yaml"
      role: storage
      count: 1

  firewalls:
    - name: haven_fw_hetzner_hearth
      file: "config/hearth/fw-hetzner-hearth.yaml"
    - name: haven_fw_hetzner_forge
      file: "config/forge/fw-hetzner-forge.yaml"
