apiVersion: strata.huybrechts.xyz/v1
kind: module
meta:
  name: wud
  annotations:
    description: What's Up Docker — container image update notifications with web UI
  labels:
    version: "1.0.0"
  tags: [haven, hearth, wud, monitoring, updates]
spec:
  source:
    repository: haven
    source_path: services/hearth/wud
  type: compose
  references:
    secrets: []
  services:
    - name: wud
      image: fmartinou/whats-up-docker:6.6.1
      restart: unless-stopped
      environment:
        - key: TZ
          value: Europe/Brussels
        - key: WUD_WATCHER_LOCAL_WATCHBYDEFAULT
          value: "true"
      mounts:
        - name: docker-socket
          type: bind
          source_path: /var/run/docker.sock
          target_path: /var/run/docker.sock
          read_only: true
