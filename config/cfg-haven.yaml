apiVersion: strata.huybrechts.xyz/v1
kind: configuration
meta:
  name: haven_config
  annotations:
    description: Haven family platform configuration — Hetzner Hearth (Docker Compose) + Forge (k3s)
  labels:
    version: "1.0.0"
  tags: [haven, hetzner, configuration, family]
spec:
  # ---------------------------------------------------------------------------
  # Logging
  # ---------------------------------------------------------------------------
  logging:
    file: "config/cfg-logging.yaml"

  # ---------------------------------------------------------------------------
  # Deployment layering — single environment layer
  # ---------------------------------------------------------------------------
  layering:
    - name: environment
      description: "Deployment environment"
      pattern: ""
      required: true

  # ---------------------------------------------------------------------------
  # Deployment properties schema
  # ---------------------------------------------------------------------------
  deployment:
    additional_properties: false
    properties:
      environment:
        pattern: "^(prd|dev)$"
        required: true
        description: "Deployment environment (prd, dev)"

  # ---------------------------------------------------------------------------
  # Tool integrations
  # ---------------------------------------------------------------------------
  integrations:
    - name: git
      type: git
      capabilities: [repository]
      description: Git version control
      required: true
      validation:
        command: git --version
        min_version: "2.30.0"
      authentication:
        method: cli

    - name: haven_iac
      type: terraform
      capabilities: [infrastructure]
      description: OpenTofu / Terraform infrastructure provisioner
      required: true
      validation:
        command: tofu version
        min_version: "1.6.0"
      authentication:
        method: cli

  # ---------------------------------------------------------------------------
  # Providers
  # ---------------------------------------------------------------------------
  providers:
    - name: hetzner
      description: Hetzner Cloud — EU-DE (Nuremberg)
      additional_regions: false
      regions:
        - name: eu-de
          description: Europe — Nuremberg (nbg1), Falkenstein (fsn1)

      additional_resources: false
      resources:
        - name: virtualmachine
          category: compute
          subcategory: virtualmachine
          description: Hetzner Cloud Server
          additional_configurations: false
          configuration:
            server_type:
              pattern: "^(cx[0-9]+|cpx[0-9]+|cax[0-9]+|ccx[0-9]+)$"
              required: true
              description: "Hetzner server type (e.g. cx22, cpx41, cax21)"
            image:
              pattern: "^[a-z0-9][a-z0-9\\-\\.]{1,32}$"
              required: true
              description: "OS image slug (e.g. ubuntu-24.04, debian-12)"
            location:
              pattern: "^(nbg1|fsn1|hel1|ash|hil)$"
              required: true
              description: "Datacenter location (nbg1=Nuremberg, fsn1=Falkenstein, hel1=Helsinki)"

  # ---------------------------------------------------------------------------
  # Topologies
  # ---------------------------------------------------------------------------
  additional_topologies: false
  topologies:
    - type: single_node
      description: Single-node Docker Compose host (Hearth — Caddy, Authentik, Vaultwarden, Infisical)
      additional_components: false
      components:
        - role: node
          description: Docker Compose host node
          uses_module: false
          is_control: true
          required: true
          min_count: 1
          max_count: 1
