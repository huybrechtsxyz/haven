apiVersion: strata.huybrechts.xyz/v1
kind: configuration
meta:
  name: haven_config
  annotations:
    description: Haven family platform configuration — Hetzner Hearth (Docker Compose) + Forge (k3s)
  labels:
    version: "1.0.0"
  tags: [haven, hetzner, configuration, family]
spec:
  # ---------------------------------------------------------------------------
  # Logging
  # ---------------------------------------------------------------------------
  logging:
    file: "config/cfg-logging.yaml"

  # ---------------------------------------------------------------------------
  # Deployment layering — single environment layer
  # ---------------------------------------------------------------------------
  layering:
    - name: environment
      description: "Deployment environment"
      pattern: ""
      required: true

  # ---------------------------------------------------------------------------
  # Deployment properties schema
  # ---------------------------------------------------------------------------
  deployment:
    additional_properties: false
    properties:
      environment:
        pattern: "^(prd|dev)$"
        required: true
        description: "Deployment environment (prd, dev)"

  # ---------------------------------------------------------------------------
  # Tool integrations
  # ---------------------------------------------------------------------------
  integrations:
    - name: git
      type: git
      capabilities: [repository]
      description: Git version control
      required: true
      validation:
        command: git --version
        min_version: "2.30.0"
      authentication:
        method: cli

    - name: haven_iac
      type: terraform
      capabilities: [infrastructure]
      description: OpenTofu / Terraform infrastructure provisioner
      required: true
      validation:
        command: tofu version
        min_version: "1.6.0"
      authentication:
        method: cli

    - name: ansible
      type: ansible
      capabilities: [infrastructure]
      description: Ansible configuration management
      required: true
      validation:
        command: ansible --version
        min_version: "2.14.0"
      authentication:
        method: cli

    - name: infisical
      type: infisical
      capabilities: [secrets]
      description: Infisical secrets manager (target state — not available during Wave 1 bootstrap)
      required: false
      validation:
        command: infisical --version
        min_version: "0.6.0"
      endpoints:
        address: https://secrets.huybrechts.xyz
      authentication:
        method: api_key
        api_key:
          api_key: INFISICAL_TOKEN

  # ---------------------------------------------------------------------------
  # Providers
  # ---------------------------------------------------------------------------
  providers:
    - name: hetzner
      description: Hetzner Cloud — EU-DE (Nuremberg)
      additional_regions: false
      regions:
        - name: eu-de
          description: Europe — Nuremberg (nbg1), Falkenstein (fsn1)

      additional_resources: false
      resources:
        - name: virtualmachine
          category: compute
          subcategory: virtualmachine
          description: Hetzner Cloud Server
          additional_configurations: false
          configuration:
            server_type:
              pattern: "^(cx[0-9]+|cpx[0-9]+|cax[0-9]+|ccx[0-9]+)$"
              required: true
              description: "Hetzner server type (e.g. cx22, cpx41, cax21)"
            image:
              pattern: "^[a-z0-9][a-z0-9\\-\\.]{1,32}$"
              required: true
              description: "OS image slug (e.g. ubuntu-24.04, debian-12)"
            location:
              pattern: "^(nbg1|fsn1|hel1|ash|hil)$"
              required: true
              description: "Datacenter location (nbg1=Nuremberg, fsn1=Falkenstein, hel1=Helsinki)"

        - name: storagebox
          category: storage
          subcategory: nas
          description: Hetzner Storage Box — BorgBackup target
          additional_configurations: false
          configuration:
            type:
              pattern: "^bx(11|21|31|41|61)$"
              required: true
              description: "Storage Box plan (bx11=1TB, bx21=2TB, bx31=5TB, bx41=10TB, bx61=20TB)"
            location:
              pattern: "^(nbg1|fsn1|hel1)$"
              required: true
              description: "Datacenter location — must match VPS region for private network access"

  # ---------------------------------------------------------------------------
  # Topologies
  # ---------------------------------------------------------------------------
  additional_topologies: false
  topologies:
    - type: single_node
      description: Single-node Docker Compose host (Hearth — Caddy, Authentik, Vaultwarden, Infisical)
      additional_components: false
      components:
        - role: node
          description: Docker Compose host node
          uses_module: false
          is_control: true
          required: true
          min_count: 1
          max_count: 1

    - type: k3s_single
      description: Single-node k3s cluster (Forge — Immich, Gatus, home-grown apps)
      additional_components: false
      components:
        - role: server
          description: k3s server node (combined control-plane + worker)
          uses_module: false
          is_control: true
          required: true
          min_count: 1
          max_count: 1
