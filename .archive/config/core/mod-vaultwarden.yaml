apiVersion: strata.huybrechts.xyz/v1
kind: module
meta:
  name: vaultwarden
  annotations:
    description: Vaultwarden password manager — Bitwarden-compatible with SQLite backend
  tags: [vaultwarden, passwords, bitwarden, core]
spec:
  source:
    repository: haven
    source_path: config/core
  type: compose
  references:
    variables:
      - VAULTWARDEN_DOMAIN
    secrets:
      - VAULTWARDEN_ADMIN_TOKEN
  services:
    - name: vaultwarden
      image: vaultwarden/server:latest
      restart: unless-stopped
      environment:
        - key: DOMAIN
          var: VAULTWARDEN_DOMAIN
        - key: ADMIN_TOKEN
          secret: VAULTWARDEN_ADMIN_TOKEN
        - key: SIGNUPS_ALLOWED
          value: "false"
        - key: TZ
          value: Europe/Brussels
      mounts:
        - name: data
          target_path: /data
          volume_ref: data
