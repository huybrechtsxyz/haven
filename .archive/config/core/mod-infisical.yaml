apiVersion: strata.huybrechts.xyz/v1
kind: module
meta:
  name: infisical
  annotations:
    description: Infisical secrets manager — PostgreSQL + Redis + backend API
  tags: [infisical, secrets, core]
spec:
  source:
    repository: haven
    source_path: config/core
  type: compose
  references:
    variables:
      - INFISICAL_SITE_URL
    secrets:
      - INFISICAL_ENCRYPTION_KEY
      - INFISICAL_AUTH_SECRET
      - INFISICAL_POSTGRES_PASSWORD
      - INFISICAL_DB_CONNECTION_URI
  services:
    - name: postgresql
      image: postgres:16-alpine
      restart: unless-stopped
      environment:
        - key: POSTGRES_DB
          value: infisical
        - key: POSTGRES_USER
          value: infisical
        - key: POSTGRES_PASSWORD
          secret: INFISICAL_POSTGRES_PASSWORD
        - key: TZ
          value: Europe/Brussels
      mounts:
        - name: pgdata
          target_path: /var/lib/postgresql/data
          volume_ref: pgdata
      healthcheck:
        name: postgres-ready
        type: command
        interval: 30s
        timeout: 5s
        retries: 5
        command:
          - pg_isready
          - -U
          - infisical

    - name: redis
      image: redis:7-alpine
      restart: unless-stopped
      mounts:
        - name: redisdata
          target_path: /data
          volume_ref: redisdata

    - name: backend
      image: infisical/infisical:latest
      restart: unless-stopped
      depends_on:
        - postgresql
        - redis
      environment:
        - key: DB_CONNECTION_URI
          secret: INFISICAL_DB_CONNECTION_URI
        - key: REDIS_URL
          value: redis://infisical-redis:6379
        - key: ENCRYPTION_KEY
          secret: INFISICAL_ENCRYPTION_KEY
        - key: AUTH_SECRET
          secret: INFISICAL_AUTH_SECRET
        - key: SITE_URL
          var: INFISICAL_SITE_URL
        - key: NODE_ENV
          value: production
        - key: PORT
          value: "8080"
        - key: TZ
          value: Europe/Brussels
