apiVersion: strata.huybrechts.xyz/v1
kind: module
meta:
  name: authentik
  annotations:
    description: Authentik identity provider — PostgreSQL + Redis + server + worker
  tags: [authentik, sso, identity, core]
spec:
  source:
    repository: haven
    source_path: config/core
  type: compose
  references:
    variables:
      - SUBDOMAIN_AUTH
    secrets:
      - AUTHENTIK_SECRET_KEY
      - AUTHENTIK_POSTGRES_PASSWORD
  services:
    - name: postgresql
      image: postgres:16-alpine
      restart: unless-stopped
      environment:
        - key: POSTGRES_DB
          value: authentik
        - key: POSTGRES_USER
          value: authentik
        - key: POSTGRES_PASSWORD
          secret: AUTHENTIK_POSTGRES_PASSWORD
        - key: TZ
          value: Europe/Brussels
      mounts:
        - name: pgdata
          target_path: /var/lib/postgresql/data
          volume_ref: pgdata
      healthcheck:
        name: postgres-ready
        type: command
        interval: 30s
        timeout: 5s
        retries: 5
        command:
          - pg_isready
          - -U
          - authentik

    - name: redis
      image: redis:7-alpine
      restart: unless-stopped
      command:
        - redis-server
        - --save
        - "60"
        - "1"
        - --loglevel
        - warning
      mounts:
        - name: redisdata
          target_path: /data
          volume_ref: redisdata
      healthcheck:
        name: redis-ready
        type: command
        interval: 30s
        timeout: 5s
        retries: 5
        command:
          - redis-cli
          - ping

    - name: server
      image: ghcr.io/goauthentik/server:2024.12.2
      command:
        - server
      restart: unless-stopped
      depends_on:
        - postgresql
        - redis
      environment:
        - key: AUTHENTIK_REDIS__HOST
          value: authentik-redis
        - key: AUTHENTIK_POSTGRESQL__HOST
          value: authentik-postgresql
        - key: AUTHENTIK_POSTGRESQL__NAME
          value: authentik
        - key: AUTHENTIK_POSTGRESQL__USER
          value: authentik
        - key: AUTHENTIK_POSTGRESQL__PASSWORD
          secret: AUTHENTIK_POSTGRES_PASSWORD
        - key: AUTHENTIK_SECRET_KEY
          secret: AUTHENTIK_SECRET_KEY
        - key: AUTHENTIK_ERROR_REPORTING__ENABLED
          value: "false"
        - key: TZ
          value: Europe/Brussels
      mounts:
        - name: media
          target_path: /media
          volume_ref: media

    - name: worker
      image: ghcr.io/goauthentik/server:2024.12.2
      command:
        - worker
      restart: unless-stopped
      depends_on:
        - postgresql
        - redis
      environment:
        - key: AUTHENTIK_REDIS__HOST
          value: authentik-redis
        - key: AUTHENTIK_POSTGRESQL__HOST
          value: authentik-postgresql
        - key: AUTHENTIK_POSTGRESQL__NAME
          value: authentik
        - key: AUTHENTIK_POSTGRESQL__USER
          value: authentik
        - key: AUTHENTIK_POSTGRESQL__PASSWORD
          secret: AUTHENTIK_POSTGRES_PASSWORD
        - key: AUTHENTIK_SECRET_KEY
          secret: AUTHENTIK_SECRET_KEY
        - key: AUTHENTIK_ERROR_REPORTING__ENABLED
          value: "false"
        - key: TZ
          value: Europe/Brussels
      mounts:
        - name: media
          target_path: /media
          volume_ref: media
