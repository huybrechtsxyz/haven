apiVersion: strata.huybrechts.xyz/v1
kind: namespace
meta:
  name: core
  annotations:
    description: Core services — reverse proxy, identity provider, password manager, and secrets manager
  labels:
    topology: hetzner_hearth
    environment: production
  tags: [core, compose, hearth, production]
spec:
  modules:
    - name: caddy
      description: Caddy reverse proxy — TLS termination and request routing
      file: config/core/mod-caddy.yaml
    - name: authentik
      description: Authentik identity provider — SSO and user management
      file: config/core/mod-authentik.yaml
    - name: vaultwarden
      description: Vaultwarden password manager — Bitwarden-compatible
      file: config/core/mod-vaultwarden.yaml
    - name: infisical
      description: Infisical secrets manager — runtime secret injection
      file: config/core/mod-infisical.yaml
